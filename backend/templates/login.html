<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MilkFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient {
            background: radial-gradient(circle at top right, #3b82f6, #1e40af);
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] p-10 md:p-12 border border-gray-100 shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i data-lucide="droplets"></i>
                </div>
                <span class="font-extrabold text-2xl text-gray-800 tracking-tight">MilkFlow</span>
            </div>

            <h2 class="text-3xl font-black text-gray-900 mb-2">Welcome Back</h2>
            <p class="text-gray-500 mb-8">Access your personalized dashboard.</p>

            {% if form.errors %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-xl">
                <p class="text-red-700 text-sm font-bold">Invalid username or password. Please try again.</p>
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" name="username" required 
                               class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-gray-300"
                               placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" name="password" required 
                               class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-gray-300"
                               placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-500/30 transform hover:-translate-y-1">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-10 pt-8 border-t border-gray-50 text-center">
                <p class="text-gray-400 text-sm">Don't have an account? 
                    <a href="/#join" class="text-blue-600 font-bold hover:underline">Join our network</a>
                </p>
            </div>
        </div>

        <!-- Decorative backgrounds -->
        <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-50 rounded-full opacity-50 -z-0"></div>
        <div class="absolute -left-20 -bottom-20 w-48 h-48 bg-indigo-50 rounded-full opacity-50 -z-0"></div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
